<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatSphere - Chat Privado</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fab fa-discord"></i>
                <h2>ChatSphere</h2>
            </div>
            
            <div class="user-profile" id="userProfile">
                <div class="avatar-large" id="userAvatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="displayName">Cargando...</div>
                    <div class="user-id" id="displayUserId">ID: ---</div>
                </div>
                <button id="editProfileBtn" class="icon-btn"><i class="fas fa-pen"></i></button>
            </div>

            <div class="section-header">
                <span><i class="fas fa-user-friends"></i> Amigos</span>
                <button id="addFriendBtn" class="icon-btn-sm"><i class="fas fa-plus"></i></button>
            </div>
            <div class="friends-list" id="friendsList">
                <div class="empty-state">No hay amigos.<br>Usa el botón + para agregar</div>
            </div>

            <div class="section-header">
                <span><i class="fas fa-comments"></i> Chats</span>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="empty-state">Selecciona un amigo</div>
            </div>

            <button id="searchUserBtn" class="search-btn">
                <i class="fas fa-search"></i> Buscar usuario
            </button>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <div class="chat-with" id="chatWithInfo">
                    <i class="fas fa-user"></i>
                    <span>Sin chat seleccionado</span>
                </div>
                <button id="clearChatBtn" class="icon-btn" title="Limpiar chat"><i class="fas fa-trash-alt"></i></button>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <i class="fas fa-lock"></i>
                    <h3>Chats Privados</h3>
                    <p>Agrega amigos por su ID y chatea en privado</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <span>Escribiendo...</span>
            </div>

            <div class="message-input-area">
                <div class="toolbar">
                    <button id="imageUploadBtn" class="tool-btn"><i class="fas fa-image"></i></button>
                </div>
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Mensaje privado..." rows="1" maxlength="500"></textarea>
                    <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="char-counter"><span id="charCount">0</span>/500</div>
            </div>
        </main>
    </div>

    <!-- Modal Buscar -->
    <div id="searchModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Buscar usuario por ID</h3>
            <input type="text" id="searchUserId" placeholder="Ej: user_1234567890_abc" class="modal-input">
            <button id="searchSubmitBtn" class="modal-btn">Buscar</button>
            <div id="searchResult" class="search-result"></div>
        </div>
    </div>

    <!-- Modal Agregar amigo -->
    <div id="addFriendModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Agregar amigo</h3>
            <input type="text" id="friendUserId" placeholder="ID del usuario" class="modal-input">
            <button id="addFriendSubmitBtn" class="modal-btn">Agregar</button>
        </div>
    </div>

    <!-- Modal Editar perfil -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Editar perfil</h3>
            <label>Nombre</label>
            <input type="text" id="editName" placeholder="Tu nombre" class="modal-input">
            <label>Avatar (emoji)</label>
            <input type="text" id="editAvatar" placeholder="Ej: 😀" maxlength="2" class="modal-input">
            <button id="saveProfileBtn" class="modal-btn">Guardar</button>
        </div>
    </div>

    <!-- Modal Copiar -->
    <div id="copyModal" class="modal">
        <div class="modal-content">
            <p>Mensaje copiado</p>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">
    <script src="script.js"></script>
</body>
</html>
