<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChatSphere 2.0 - Chat Global</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Botón menú para móvil -->
    <button class="menu-btn" id="menuBtn">
        <i class="fas fa-bars"></i>
    </button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fab fa-discord"></i>
                <h2>ChatSphere</h2>
            </div>
            <div class="server-info">
                <div class="online-badge">
                    <i class="fas fa-globe"></i> Global Server
                </div>
                <div class="member-count">
                    <i class="fas fa-users"></i> <span id="onlineCount">1</span> conectados
                </div>
            </div>
            <div class="channels">
                <div class="channel active">
                    <i class="fas fa-hashtag"></i> general-chat
                </div>
                <div class="channel">
                    <i class="fas fa-image"></i> multimedia
                </div>
            </div>
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="username" id="usernameDisplay">Invitado</div>
                <button id="editNameBtn" class="icon-btn"><i class="fas fa-pen"></i></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header">
                <div class="channel-name">
                    <i class="fas fa-hashtag"></i> general-chat
                </div>
                <div class="header-actions">
                    <button id="clearChatBtn" class="icon-btn" title="Limpiar chat">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <div class="messages-container" id="messagesContainer">
                <div class="welcome-message">
                    <i class="fas fa-robot"></i>
                    <h3>Bienvenido a ChatSphere 2.0</h3>
                    <p>✨ Chat global con moderación ✨<br>📸 Envía imágenes | 💬 Copia mensajes | ↩️ Responde</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <span>Alguien está escribiendo</span><span class="dot-floating">...</span>
            </div>

            <div class="message-input-area">
                <div class="toolbar">
                    <button id="imageUploadBtn" class="tool-btn" title="Subir imagen">
                        <i class="fas fa-image"></i>
                    </button>
                </div>
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Escribe un mensaje..." rows="1" maxlength="500"></textarea>
                    <button id="sendBtn" class="send-btn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
                <div class="char-counter"><span id="charCount">0</span>/500</div>
            </div>
        </main>
    </div>

    <!-- Modal para copiar mensaje -->
    <div id="copyModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <p>¡Mensaje copiado al portapapeles!</p>
        </div>
    </div>

    <input type="file" id="imageInput" accept="image/*" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
